kind = "web"
previewPath = "/"
title = "Feiticeiros & Maldições"
version = "1.0.0"
id = "artifacts/feiticeiros"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19150

[services.development]
run = "pnpm --filter @workspace/feiticeiros run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/feiticeiros", "run", "build" ]
publicDir = "artifacts/feiticeiros/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19150"
BASE_PATH = "/"
